<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Secure Messenger</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            height: 100vh;
            margin: 0;
            background: #e5ddd5;
        }

        .sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            background: #f0f2f5;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .user-list {
            overflow-y: auto;
            flex: 1;
        }

        .user-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .user-item:hover, .user-item.active {
                background: #e9eaeb;
            }

        .avatar {
            width: 40px;
            height: 40px;
            background: #ccc;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #ccc;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 50%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.4;
            position: relative;
        }

            .msg.me {
                background: #dcf8c6;
                align-self: flex-end;
                border-bottom-right-radius: 2px;
            }

            .msg.other {
                background: white;
                align-self: flex-start;
                border-bottom-left-radius: 2px;
            }

            .msg img {
                max-width: 100%;
                border-radius: 8px;
                margin-top: 5px;
            }

        .meta-info {
            font-size: 11px;
            color: #555;
            margin-top: 8px;
            background: #fff3cd;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ffeeba;
        }

        .input-area {
            padding: 15px 20px;
            background: #f0f2f5;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 20px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        /* Khung Modal So Sánh Ảnh */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 800px;
            text-align: center;
        }

        .compare-container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .compare-box {
            flex: 1;
        }

            .compare-box img {
                max-width: 100%;
                border: 2px solid #ccc;
                border-radius: 8px;
            }

        .close-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <span>👤 {{ current_user }}</span>
            <button onclick="window.location.href='/logout'" style="background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 4px rgba(220, 53, 69, 0.2);">
                Đăng xuất 🚪
            </button>
        </div> 
        <div class="user-list">
            {% for u in users %}
            <div class="user-item" onclick="selectUser('{{ u.username }}', this)">
                <div class="avatar" style="background: #{{ loop.index * 111111 }};">{{ u.username[0]|upper }}</div>
                <div>{{ u.username }}</div>
            </div>
            {% endfor %}
        </div>
    </div> <div class="chat-area" id="chatArea" style="visibility: hidden;">
        <div class="chat-header" id="chatWith"></div>
        <div class="messages" id="msgBox"></div>

        <div class="input-area">
            <input type="file" id="imgInput" accept="image/*" style="width: 220px;">
            <input type="text" id="txtInput" placeholder="Nhập tin nhắn..." onkeypress="if(event.key === 'Enter') sendMsg()">
            <button onclick="sendMsg()">Gửi</button>
        </div>

        <div style="padding: 10px 20px; background: #fff3cd; border-top: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center;">
            <b style="font-size: 14px;">Công cụ Giám định Ảnh</b>
            <button onclick="toggleVerifyTool()" style="background: #6c757d; border-radius: 5px; padding: 5px 15px; font-size: 12px;">Hiện / Ẩn công cụ</button>
        </div>

        <div id="verifyToolBox" style="display: none; padding: 15px 20px; background: #fff3cd; border-top: 1px dashed #ccc;">
            <input type="file" id="verifyImg" accept="image/*">
            <input type="text" id="verifyHash" placeholder="Dán mã băm (Hash) gốc vào đây..." style="width: 250px; padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
            <button onclick="verifyTamperedImage()" style="background: #28a745; padding: 5px 15px; border-radius: 4px;">Kiểm tra</button>
        </div>
    </div>

    <script>
        let currentUser = '{{ current_user }}';
        let chatTarget = '';

        // Hàm Đóng/Mở khung kiểm tra
        function toggleVerifyTool() {
            let box = document.getElementById('verifyToolBox');
            if (box.style.display === 'none') {
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }

        function selectUser(user, elem) {
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            elem.classList.add('active');
            chatTarget = user;
            document.getElementById('chatWith').innerText = "Đang chat với: " + user;
            document.getElementById('chatArea').style.visibility = 'visible';
            loadMessages(); // Load ngay lập tức khi bấm vào tên người dùng
        }

        async function loadMessages() {
            if (!chatTarget) return;
            let res = await fetch('/api/messages/' + chatTarget);
            let msgs = await res.json();
            let html = '';

            msgs.forEach(m => {
                let cls = (m.sender === currentUser) ? 'msg me' : 'msg other';
                let content = m.content;

                // Hiển thị ảnh kèm log bảo mật đầy đủ theo yêu cầu 1 (Đã thêm backtick `)
                if (m.is_image && m.sender !== currentUser) {
                    content = `<img src="data:image/jpeg;base64,${m.content}">
                    <div class="meta-info" style="text-align: left;">
                      <b>🛡 Thông tin bảo mật:</b><br>
                      • <b>ID ảnh:</b> ${m.meta.image_id}<br>
                      • <b>Người gửi:</b> ${m.meta.owner_id}<br>
                      • <b>Người nhận:</b> ${m.meta.receiver_id}<br>
                      • <b>Thời gian:</b> ${new Date(m.meta.timestamp * 1000).toLocaleString()}<br>
                      <hr style="border: 0; border-top: 1px solid #ccc; margin: 5px 0;">
                      Khóa AES giải mã thành công<br>
                      Toàn vẹn dữ liệu: OK<br>
                      Mã băm (Hash): <b style="color: blue; cursor: pointer; text-decoration: underline;" onclick="navigator.clipboard.writeText('${m.meta.watermark_hash}'); alert('Đã copy toàn bộ mã Hash gốc vào khay nhớ tạm!');">Nhấn để Copy mã gốc</b>
                    </div>`;
                }

                // Đã thêm backtick `
                html += `<div class="${cls}"><b>${m.sender}</b><br>${content}</div>`;
            });

            let box = document.getElementById('msgBox');
            // Để tránh việc đang kéo đọc tin nhắn cũ bị cuộn xuống, ta chỉ cuộn khi có tin nhắn mới
            let isScrolledToBottom = box.scrollHeight - box.clientHeight <= box.scrollTop + 50;
            box.innerHTML = html;
            if (isScrolledToBottom) {
                box.scrollTop = box.scrollHeight;
            }
        }

        async function sendMsg() {
            if (!chatTarget) return;
            let txt = document.getElementById('txtInput').value;
            let file = document.getElementById('imgInput').files[0];
            if (!txt && !file) return;

            let fd = new FormData();
            fd.append('receiver', chatTarget);
            if (txt) fd.append('text', txt);
            if (file) fd.append('file', file);

            document.getElementById('txtInput').value = '';
            document.getElementById('imgInput').value = '';

            let res = await fetch('/api/send', { method: 'POST', body: fd });
            let data = await res.json();

            // 🛡️ BẮT LỖI TỪ HỆ THỐNG PHÒNG THỦ
            if (data.status === 'error') {
                alert(data.msg); // Bắn Popup thông báo chữ đỏ cho user biết file bị chặn
                return; // Ngắt hàm, không chạy phần hiển thị Modal bên dưới
            }

            if (data.original_img && data.watermarked_img) {
                document.getElementById('imgBefore').src = "data:image/jpeg;base64," + data.original_img;
                document.getElementById('imgAfter').src = "data:image/jpeg;base64," + data.watermarked_img;
                document.getElementById('compareModal').style.display = 'flex';
            }

            loadMessages(); // Máy mình gửi xong tự động hiện lên luôn
        }

        async function verifyTamperedImage() {
            let file = document.getElementById('verifyImg').files[0];
            let hash = document.getElementById('verifyHash').value;
            if (!file || !hash) return alert("Vui lòng chọn ảnh đã tải về và dán mã băm (Hash) gốc!");

            let fd = new FormData();
            fd.append('file', file);
            fd.append('original_hash', hash);

            let res = await fetch('/api/verify_image', { method: 'POST', body: fd });
            let data = await res.json();
            alert(data.msg);
        }

        // TÍNH NĂNG TỰ ĐỘNG CẬP NHẬT (REALTIME)
        // Cứ mỗi 1.5 giây, ngầm chạy hàm loadMessages để quét tin nhắn mới
        setInterval(() => {
            if (chatTarget) {
                loadMessages();
            }
        }, 1500);

    </script>

    <div class="modal-overlay" id="compareModal">
        <div class="modal-content">
            <h3>🔍 So sánh ảnh trước và sau khi gắn Watermark</h3>
            <p>Hệ thống vừa tự động chèn Watermark chéo và đóng gói mã hóa ảnh của bạn.</p>
            <div class="compare-container">
                <div class="compare-box">
                    <h4>Ảnh Gốc (Original)</h4>
                    <img id="imgBefore" src="">
                </div>
                <div class="compare-box">
                    <h4>Ảnh đã xử lý (Watermarked)</h4>
                    <img id="imgAfter" src="">
                </div>
            </div>
            <button class="close-btn" onclick="document.getElementById('compareModal').style.display='none'">Xác nhận & Đóng</button>
        </div>
    </div>
</body>
</html>
